output_path = "dist/economist-fulltext.xml"
database_path = "data/economist-rss.sqlite3"
rss_item_limit = 500
timeout_seconds = 20
refresh_interval_seconds = 300
article_lookback_days = 30
min_article_delay_seconds = 75
max_article_delay_seconds = 180
max_articles_per_refresh = 5
retry_failed_after_seconds = 21600
user_agent = "economist-newspaper-rss-feed/0.1 (+https://github.com/andrewfurman/economist-newspaper-rss-feed)"
browser_fetch_enabled = false
browser_headless = true
browser_channel = "chrome"
browser_executable_path = ""
browser_wait_ms = 3000
browser_fetch_timeout_seconds = 180
auth_wait_seconds = 600
browser_user_data_dir = ".cache/economist-browser-profile"
browser_storage_state = ".cache/economist-browser-state.json"
login_url = "https://www.economist.com/api/auth/login"
verify_url = "https://www.economist.com/culture/2026/06/19/plot-twist-newsletter-the-art-of-adolescence"
exclude_url_patterns = []
world_in_brief_enabled = true
world_in_brief_url = "https://www.economist.com/the-world-in-brief"
world_in_brief_refresh_interval_seconds = 3600

